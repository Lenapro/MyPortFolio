<header class="bg-[#0B0C15] border-b border-gray-700 ">
  <div class="px-4 sm:px-6 lg:px-20 xl:px-40">
    <div class="flex h-16 items-center justify-between">
      <div class="flex-1 md:flex md:items-center md:gap-12">
        <a class="block text-[#6B46E5]" href="#">
          <span class="lg:hidden font-bold p-3.5 rounded-full bg-gray-300" >PH</span>
          <span class="hidden lg:inline-block font-bold">Providence</span> 
          <span class="hidden lg:inline-block text-gray-500 pl-1.5">| Développeuse Web - FullStack</span>
        </a>
      </div>

      <div class="md:flex md:items-center md:gap-12">
        <nav aria-label="Global" class="hidden md:block">
          <ul class="flex items-center gap-6 text-sm">
            <li>
              <a class="text-gray-200 transition hover:text-gray-500/75" href="#" routerLink="/">
                Accueil
              </a>
            </li>

            <li>
              <a class="text-gray-200 transition hover:text-gray-500/75 " href="#" routerLink="/competences">
               Mes Compétences
              </a>
            </li>

            <li>
              <a class="text-gray-200 transition hover:text-gray-500/75 " href="#" routerLink="/projets">
                Mes Projets
              </a>
            </li>
          </ul>
        </nav>

        <div class="flex items-center gap-4">
          <div class="hidden md:flex md:gap-4">
            <a class="rounded-lg bg-[#6B46E5] px-5 py-2 text-sm font-medium text-white shadow-sm" href="#" routerLink="/contact">
             Me Contacter
            </a>
          </div>
          <div class="block md:hidden" (click)="toggleMenu()">
            <button class="rounded-sm bg-gray-100 p-2 text-gray-600 transition hover:text-gray-600/75 ">
              <svg xmlns="http://www.w3.org/2000/svg" class="size-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"></path>
              </svg>
            </button>
          </div>
          @if (isMenuOpen) {
            <div role="menu" class="absolute md:hidden block end-0 top-14 z-auto w-40 divide-y divide-gray-200 overflow-hidden rounded border border-gray-300 bg-[#0B0C15] shadow-sm ">
              <div>
                <a href="/" class="block px-3 py-2 text-sm font-medium text-gray-700 transition-colors hover:bg-gray-50 hover:text-gray-900 dark:text-gray-200 dark:hover:bg-gray-700 dark:hover:text-white" role="menuitem">
                  Accueil
                </a>

              <a href="/competences" class="block px-3 py-2 text-sm font-medium text-gray-700 transition-colors hover:bg-gray-50 hover:text-gray-900 dark:text-gray-200 dark:hover:bg-gray-700 dark:hover:text-white" role="menuitem">
                Mes Compétences
              </a>

              <a href="/projets" class="block px-3 py-2 text-sm font-medium text-gray-700 transition-colors hover:bg-gray-50 hover:text-gray-900 dark:text-gray-200 dark:hover:bg-gray-700 dark:hover:text-white" role="menuitem">
                Mes Projets
              </a>
            </div>
            <button>
              <a href="/contact" class="block w-full px-3 py-2 text-sm font-medium text-[#6B46E5] transition-colors hover:bg-gray-50 hover:text-gray-900 " role="menuitem">
                Me Contacter
              </a>
            </button>
            </div>
          }
        </div>
      </div>
    </div>
  </div>
</header>
